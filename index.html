<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Csatorna — real-time vonal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rig">
  <div class="rig-head">
    <h1>Csatorna</h1>
    <span class="freq" id="freqLabel">— nincs kapcsolat —</span>
  </div>

  <!-- SETUP -->
  <div class="screen" id="setupScreen">
    <label for="room">Szoba neve</label>
    <input type="text" id="room" placeholder="pl. anna-es-peter">
    <div class="hint">Bármit beírhatsz — a másik embernek ugyanezt kell megadnia. Csak két név férhet el egy szobában.</div>

    <label for="name">A neved</label>
    <input type="text" id="name" placeholder="pl. Anna">

    <button id="joinBtn">Csatlakozás a vonalhoz</button>
    <div class="error" id="setupError"></div>
  </div>

  <!-- CHAT -->
  <div class="hidden" id="chatScreen">
    <div class="status-bar">
      <span class="dot"></span>
      <span id="participantsLabel">kapcsolódva</span>
    </div>
    <div class="log" id="log"></div>
    <div class="composer">
      <input type="text" id="msgInput" placeholder="Írj valamit...">
      <button id="sendBtn">Küldés</button>
    </div>
  </div>
</div>

<!-- Biztosan működő, kompatibilis Firebase SDK betöltése -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
  // A te saját Firebase konfigurációd közvetlenül beágyazva
  const firebaseConfig = {
    apiKey: "AIzaSyAytpBEZNb4cEsbpsuWz2zpszkxCTDCN2g",
    authDomain: "://firebaseapp.com",
    databaseURL: "https://firebasedatabase.app",
    projectId: "kobra-d3464",
    storageBucket: "kobra-d3464.firebasestorage.app",
    messagingSenderId: "127800460763",
    appId: "1:127800460763:web:5e690d2638a4b7aaf093fe"
  };

  // Inicializálás a kompatibilis verzió szerint
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let state = { room: '', name: '', messagesRef: null };

  const setupScreen = document.getElementById('setupScreen');
  const chatScreen = document.getElementById('chatScreen');
  const setupError = document.getElementById('setupError');
  const freqLabel = document.getElementById('freqLabel');
  const logEl = document.getElementById('log');
  const participantsLabel = document.getElementById('participantsLabel');
  const joinBtn = document.getElementById('joinBtn');

  function showError(msg){
    setupError.textContent = msg;
    setupError.style.display = 'block';
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function appendMessage(m){
    const div = document.createElement('div');
    div.className = 'entry ' + (m.name === state.name ? 'mine' : '');
    const time = m.ts ? new Date(m.ts).toLocaleTimeString('hu-HU', {hour:'2-digit', minute:'2-digit'}) : '';
    div.innerHTML =
      '<div class="who">' + escapeHtml(m.name) + '</div>' +
      '<div class="bubble">' + escapeHtml(m.text) + '</div>' +
      '<div class="ts">' + time + '</div>';
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  joinBtn.addEventListener('click', async () => {
    setupError.style.display = 'none';
    const room = document.getElementById('room').value.trim();
    const name = document.getElementById('name').value.trim();

    if(!room){ showError('Add meg a szoba nevét.'); return; }
    if(!name){ showError('Add meg a neved.'); return; }

    joinBtn.disabled = true;
    joinBtn.textContent = 'Kapcsolódás...';

    const participantsRef = db.ref('rooms/' + room + '/participants');

    try{
      const result = await participantsRef.transaction(current => {
        const participants = current || {};
        if(participants[name]) return participants;
        const names = Object.keys(participants);
        if(names.length >= 2) return; // szoba tele van
        participants[name] = true;
        return participants;
      });

      if(!result.committed){
        showError('Ez a szoba már tele van (2 ember beszélget itt).');
        joinBtn.disabled = false;
        joinBtn.textContent = 'Csatlakozás a vonalhoz';
        return;
      }

      state.room = room;
      state.name = name;

      setupScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      freqLabel.textContent = 'szoba: ' + room;

      participantsRef.on('value', snap => {
        const participants = snap.val() || {};
        participantsLabel.textContent = Object.keys(participants).join(' • ') || 'kapcsolódva';
      });

      const messagesRef = db.ref('rooms/' + room + '/messages');
      messagesRef.limitToLast(200).on('child_added', snap => {
        appendMessage(snap.val());
      });

      state.messagesRef = messagesRef;

    } catch(e){
      showError('Nem sikerült csatlakozni: ' + e.message);
      joinBtn.disabled = false;
      joinBtn.textContent = 'Csatlakozás a vonalhoz';
    }
  });

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('msgInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') sendMessage();
  });

  function sendMessage(){
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text || !state.messagesRef) return;
    input.value = '';
    state.messagesRef.push({
      name: state.name,
      text: text,
      ts: firebase.database.ServerValue.TIMESTAMP
    });
  }
</script>

</body>
</html>
