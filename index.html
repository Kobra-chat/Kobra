<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Csatorna — Biztonságos Vonal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BETÖLTÉS -->
<div id="loadingScreen" class="center-screen">
  <div class="dial-graphic" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<!-- BEJELENTKEZÉS / REGISZTRÁCIÓ -->
<div id="authScreen" class="center-screen hidden">
  <div class="rig auth-card">
    <div class="rig-head">
      <div class="dial-graphic" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <h1>Csatorna</h1>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin">Bejelentkezés</button>
      <button class="tab" id="tabRegister">Regisztráció</button>
    </div>

    <div class="screen">
      <label for="authUsername">Felhasználónév</label>
      <input type="text" id="authUsername" placeholder="pl. patrik99" autocomplete="off">

      <label for="authPassword">Jelszó</label>
      <input type="password" id="authPassword" placeholder="legalább 6 karakter" autocomplete="off">

      <button id="authSubmit">Bejelentkezés</button>
      <div class="error" id="authError"></div>
    </div>
  </div>
</div>

<!-- FŐALKALMAZÁS -->
<div id="appScreen" class="app-shell hidden">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="me">
        <div class="avatar" id="myAvatar"></div>
        <span id="myUsername"></span>
      </div>
      <button class="icon-btn" id="logoutBtn" title="Kijelentkezés">⏻</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Keress felhasználót..." autocomplete="off">
      <div class="search-results hidden" id="searchResults"></div>
    </div>

    <div class="conv-list" id="convList">
      <div class="empty-hint" id="convEmptyHint">Még nincs egy beszélgetésed sem. Keress valakit fent!</div>
    </div>
  </aside>

  <main class="chat-panel">
    <div class="empty-state" id="emptyState">
      <div class="dial-graphic" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <p style="margin-top: 15px;">Válassz valakit a bal oldalon a beszélgetéshez</p>
    </div>

    <div class="chat-view hidden" id="chatView">
      <div class="chat-header">
        <div class="avatar" id="chatAvatar"></div>
        <span id="chatUsername"></span>
      </div>
      <div class="log" id="log"></div>
      <div class="composer">
        <input type="text" id="msgInput" placeholder="Írj valamit..." autocomplete="off">
        <button id="sendBtn">Küldés</button>
      </div>
    </div>
  </main>
</div>

<!-- Firebase SDK-k betöltése -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
  // A te hajszálpontos, nagy Y betűs konfigurációd
  const firebaseConfig = {
    apiKey: "AIzaSyAYtpBEZNb4cEsbpsuWz2zpszkxCTDCN2g",
    authDomain: "://firebaseapp.com",
    databaseURL: "https://firebasedatabase.app",
    projectId: "kobra-d3464",
    storageBucket: "kobra-d3464.firebasestorage.app",
    messagingSenderId: "127800460763",
    appId: "1:127800460763:web:5e690d2638a4b7aaf093fe"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  const loadingScreen = document.getElementById('loadingScreen');
  const authScreen = document.getElementById('authScreen');
  const appScreen = document.getElementById('appScreen');
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const authUsername = document.getElementById('authUsername');
  const authPassword = document.getElementById('authPassword');
  const authSubmit = document.getElementById('authSubmit');
  const authError = document.getElementById('authError');
  const myAvatar = document.getElementById('myAvatar');
  const myUsernameLabel = document.getElementById('myUsername');
  const logoutBtn = document.getElementById('logoutBtn');
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  const convList = document.getElementById('convList');
  const convEmptyHint = document.getElementById('convEmptyHint');
  const emptyState = document.getElementById('emptyState');
  const chatView = document.getElementById('chatView');
  const chatAvatar = document.getElementById('chatAvatar');
  const chatUsernameLabel = document.getElementById('chatUsername');
  const logEl = document.getElementById('log');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  let isLoginMode = true;
  let currentMyName = "";
  let currentActiveChatId = null;

  tabLogin.addEventListener('click', () => {
    isLoginMode = true; tabLogin.classList.add('active'); tabRegister.classList.remove('active');
    authSubmit.textContent = "Bejelentkezés"; authError.style.display = 'none';
  });
  tabRegister.addEventListener('click', () => {
    isLoginMode = false; tabLogin.classList.remove('active'); tabRegister.classList.add('active');
    authSubmit.textContent = "Regisztráció"; authError.style.display = 'none';
  });

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      const snap = await db.ref('users/' + user.uid).get();
      if (snap.exists()) {
        currentMyName = snap.val().username;
        myUsernameLabel.textContent = currentMyName.toUpperCase();
        myAvatar.textContent = currentMyName.charAt(0).toUpperCase();
        
        loadingScreen.classList.add('hidden');
        authScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        
        loadConversations(user.uid);
      } else {
        auth.signOut();
      }
    } else {
      loadingScreen.classList.add('hidden');
      appScreen.classList.add('hidden');
      authScreen.classList.remove('hidden');
    }
  });

  authSubmit.addEventListener('click', async () => {
    authError.style.display = 'none';
    const username = authUsername.value.trim();
    const password = authPassword.value.trim();

    if (!username || !password) { authError.textContent = "HIBA: TÖLTS KI MINDEN MEZŐT!"; authError.style.display = 'block'; return; }
    if (password.length < 6) { authError.textContent = "HIBA: MINIMUM 6 KARAKTER JELSZÓ!"; authError.style.display = 'block'; return; }

    const fakeEmail = username.toLowerCase() + "@kobra-chat.local";

    if (!isLoginMode) {
      try {
        const userCredential = await auth.createUserWithEmailAndPassword(fakeEmail, password);
        const uid = userCredential.user.uid;
        
        await db.ref('users/' + uid).set({ username: username, email: fakeEmail });
        await db.ref('usersByName/' + username.toLowerCase()).set({ uid: uid });
      } catch (error) {
        authError.textContent = "REGISZTRÁCIÓS HIBA: " + error.message.toUpperCase();
        authError.style.display = 'block';
      }
    } else {
      try {
        await auth.signInWithEmailAndPassword(fakeEmail, password);
      } catch (error) {
        authError.textContent = "HIBA: HIBÁS NÉV VAGY JELSZÓ!";
        authError.style.display = 'block';
      }
    }
  });

  searchInput.addEventListener('input', async () => {
    const queryText = searchInput.value.trim().toLowerCase();
    if (!queryText) { searchResults.classList.add('hidden'); return; }
    
    const snap = await db.ref('usersByName').get();
    searchResults.innerHTML = '';
    let found = false;

    if (snap.exists()) {
      const allUsers = snap.val();
      Object.keys(allUsers).forEach(name => {
        if (name.includes(queryText) && name !== currentMyName.toLowerCase()) {
          found = true;
          const div = document.createElement('div');
          div.className = 'search-item';
          div.textContent = name.toUpperCase();
          div.addEventListener('click', () => startChat(allUsers[name].uid, name));
          searchResults.appendChild(div);
        }
      });
    }
    
    if (found) searchResults.classList.remove('hidden');
    else searchResults.classList.add('hidden');
  });

  async function startChat(targetUid, targetName) {
    searchResults.classList.add('hidden');
    searchInput.value = '';
    const myUid = auth.currentUser.uid;
    const chatId = myUid < targetUid ? myUid + "_" + targetUid : targetUid + "_" + myUid;

    await db.ref('userChats/' + myUid + '/' + chatId).set({ otherUid: targetUid, otherName: targetName.toUpperCase() });
    await db.ref('userChats/' + targetUid + '/' + chatId).set({ otherUid: myUid, otherName: currentMyName.toUpperCase() });

    openChat(chatId, targetName.toUpperCase());
  }

  function loadConversations(uid) {
    db.ref('userChats/' + uid).on('value', snap => {
      convList.innerHTML = '';
      const chats = snap.val();
      if (!chats) { convEmptyHint.classList.remove('hidden'); return; }
      
      convEmptyHint.classList.add('hidden');
      Object.keys(chats).forEach(chatId => {
        const item = document.createElement('div');
        item.className = 'conv-item';
        if (chatId === currentActiveChatId) item.classList.add('active');
        item.innerHTML = `<div class="avatar">${chats[chatId].otherName.charAt(0)}</div><span>${chats[chatId].otherName}</span>`;
        item.addEventListener('click', () => openChat(chatId, chats[chatId].otherName));
        convList.appendChild(item);
      });
    });
  }

  function openChat(chatId, otherName) {
    currentActiveChatId = chatId;
