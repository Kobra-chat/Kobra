<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kobra</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- BETÖLTÉS -->
  <div id="loadingScreen" class="center-screen">
    <div class="brand-mark">
      <div class="dial-graphic" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <p class="brand-name">Kobra</p>
    </div>
  </div>
  <!-- BEJELENTKEZÉS / REGISZTRÁCIÓ -->
  <div id="authScreen" class="center-screen hidden">
    <div class="auth-card">
      <div class="auth-head">
        <div class="dial-graphic" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <h1>Kobra</h1>
        <p class="auth-sub">Üzenj barátoknak valós időben</p>
      </div>
      <div class="tabs">
        <button class="tab active" id="tabLogin" type="button">Bejelentkezés</button>
        <button class="tab" id="tabRegister" type="button">Regisztráció</button>
      </div>
      <div class="auth-form">
        <label for="authUsername">Felhasználónév</label>
        <input type="text" id="authUsername" placeholder="pl. patrik99" autocomplete="username" spellcheck="false">
        <label for="authPassword">Jelszó</label>
        <input type="password" id="authPassword" placeholder="legalább 6 karakter" autocomplete="current-password">
        <button id="authSubmit" type="button">Bejelentkezés</button>
        <div class="error" id="authError"></div>
      </div>
    </div>
  </div>
  <!-- FŐALKALMAZÁS -->
  <div id="appScreen" class="app-shell hidden">
    <aside class="sidebar">
      <header class="sidebar-header">
        <div class="brand-inline">
          <div class="dial-graphic small" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <span>Kobra</span>
        </div>
        <button class="icon-btn" id="logoutBtn" type="button" title="Kijelentkezés" aria-label="Kijelentkezés">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </header>
      <div class="me-bar">
        <div class="avatar" id="myAvatar"></div>
        <div class="me-info">
          <span class="me-label">Te</span>
          <span class="me-name" id="myUsername"></span>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Keress felhasználónév alapján..." autocomplete="off" spellcheck="false">
        <div class="search-results hidden" id="searchResults"></div>
      </div>
      <div class="conv-section">
        <h2 class="section-title">Üzenetek</h2>
        <div class="conv-list" id="convList">
          <div class="empty-hint" id="convEmptyHint">Még nincs beszélgetésed. Keress valakit fent!</div>
        </div>
      </div>
    </aside>
    <main class="chat-panel">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <h2>Üzeneteid</h2>
        <p>Válassz egy beszélgetést bal oldalt, vagy keress valakit új csevegéshez.</p>
      </div>
      <div class="chat-view hidden" id="chatView">
        <header class="chat-header">
          <div class="avatar" id="chatAvatar"></div>
          <div class="chat-header-text">
            <span id="chatUsername"></span>
            <span class="chat-status" id="chatStatus">Offline</span>
          </div>
        </header>
        <div class="log" id="log"></div>
        <div class="composer">
          <input type="text" id="msgInput" placeholder="Írj valamit..." autocomplete="off">
          <button id="sendBtn" type="button" aria-label="Küldés">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
